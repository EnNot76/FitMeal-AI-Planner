<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitPrep - SvuotaFrigo Performance</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html, body { height: 100%; }
    body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; }
    .scrollbar-none::-webkit-scrollbar { display: none; }
    .scrollbar-none { -ms-overflow-style: none; scrollbar-width: none; }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    @keyframes scaleIn { from { transform: scale(.98); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .animate-scaleIn { animation: scaleIn .18s ease-out; }
  </style>

  <!-- Icone SVG inline come componenti -->
  <script>
    const Icons = {
      Plus: (props) => svgIcon(`<path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" fill="none"/>`, props),
      X: (props) => svgIcon(`<path d="M6 6l12 12M6 18l12-12" stroke="currentColor" stroke-width="2" fill="none"/>`, props),
      Calendar: (props) => svgIcon(`<path d="M7 10h10M7 14h10M5 6h14a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V7a1 1 0 0 1 1-1zM5 2v4M19 2v4" stroke="currentColor" stroke-width="2" fill="none"/>`, props),
      ShoppingCart: (props) => svgIcon(`<path d="M3 3h2l.4 3M7 13h10l4-8H5.4M7 13L6.4 7M7 13l-1.3 5a2 2 0 0 0 2 2.1h8.6a2 2 0 0 0 2-2.1l-1.3-5" stroke="currentColor" stroke-width="2" fill="none"/><circle cx="9" cy="21" r="1" fill="currentColor"/><circle cx="20" cy="21" r="1" fill="currentColor"/>`, props),
      Sun: (props) => svgIcon(`<circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2" fill="none"/><path d="M12 2v2M12 20v2M4 12H2M20 12h2M5.6 5.6l1.4 1.4M17 17l1.4 1.4M5.6 18.4l1.4-1.4M17 7l1.4-1.4" stroke="currentColor" stroke-width="2" fill="none"/>`, props),
      Moon: (props) => svgIcon(`<path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 1 0 9.8 9.8" stroke="currentColor" stroke-width="2" fill="none"/>`, props),
      ChefHat: (props) => svgIcon(`<path d="M6 13h12a3 3 0 0 0 3-3V9a3 3 0 0 0-3-3H6a3 3 0 0 0-3 3v1a3 3 0 0 0 3 3zm0 0v7a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2v-7" stroke="currentColor" stroke-width="2" fill="none"/>`, props),
      Sparkles: (props) => svgIcon(`<path d="M5 8l2 4 4 2-4 2-2 4-2-4-4-2 4-2zM15 4l1 2 2 1-2 1-1 2-1-2-2-1 2-1zM18 14l1 2 2 1-2 1-1 2-1-2-2-1 2-1z" stroke="currentColor" stroke-width="2" fill="none"/>`, props),
      Send: (props) => svgIcon(`<path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" stroke="currentColor" stroke-width="2" fill="none"/>`, props),
      Loader2: (props) => svgIcon(`<path d="M12 2v4M12 18v4M4 12h4M16 12h4M6 6l2.5 2.5M15.5 15.5l2.5 2.5M6 18l2.5-2.5M15.5 6.5l2.5-2.5" stroke="currentColor" stroke-width="2" fill="none"/>`, props),
      AlertCircle: (props) => svgIcon(`<circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" fill="none"/><path d="M12 8v4M12 16h.01" stroke="currentColor" stroke-width="2" fill="none"/>`, props),
      Dumbbell: (props) => svgIcon(`<path d="M6 9h12a2 2 0 0 1 2 2v0a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v0a2 2 0 0 1 2-2zM2 9h2M20 9h2M2 15h2M20 15h2" stroke="currentColor" stroke-width="2" fill="none"/>`, props),
      Flame: (props) => svgIcon(`<path d="M12 2c0 2-2 3-2 5s1 3 2 5 2-3 2-5-2-3-2-5zM8 12c0 3 2 5 4 8 2-3 4-5 4-8s-2-4-4-2-4-4-4 2z" stroke="currentColor" stroke-width="2" fill="none"/>`, props),
      Target: (props) => svgIcon(`<circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" fill="none"/><circle cx="12" cy="12" r="6" stroke="currentColor" stroke-width="2" fill="none"/><circle cx="12" cy="12" r="2" fill="currentColor"/>`, props),
      Award: (props) => svgIcon(`<circle cx="12" cy="8" r="6" stroke="currentColor" stroke-width="2" fill="none"/><path d="M12 14v8M8 18l4 4 4-4" stroke="currentColor" stroke-width="2" fill="none"/><path d="M6 8l-2 4 2 2 2-2-2-4zM18 8l2 4-2 2-2-2 2-4z" stroke="currentColor" stroke-width="2" fill="none"/>`, props)
    };

    function svgIcon(content, { size = 20, className = "", ...rest }) {
      return `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="${className}" ${Object.keys(rest).length ? Object.entries(rest).map(([k,v]) => `${k}="${v}"`).join(' ') : ''}>${content}</svg>`;
    }
  </script>
</head>
<body>
  <div id="app"></div>

  <script>
    // --- DATABASE ---
    const RECIPES_DB = [
      { id: 1, name: "Omelette di Albumi e Spinaci", ingredients: ["albumi", "spinaci", "olio", "parmigiano"], type: "Colazione", difficulty: "Facile", macros: { p: 26, c: 3, f: 6, kcal: 170 }, tags: ["high-protein", "low-carb"] },
      { id: 2, name: "Pollo Grigliato con Broccoli", ingredients: ["pollo", "broccoli", "olio", "limone"], type: "Pranzo", difficulty: "Facile", macros: { p: 42, c: 8, f: 5, kcal: 245 }, tags: ["high-protein", "low-carb", "low-fat"] },
      { id: 3, name: "Salmone al Vapore con Asparagi", ingredients: ["salmone", "asparagi", "olio"], type: "Cena", difficulty: "Facile", macros: { p: 34, c: 4, f: 18, kcal: 314 }, tags: ["high-protein", "low-carb"] },
      { id: 4, name: "Tartare di Manzo Light", ingredients: ["manzo", "limone", "senape", "olio", "capperi"], type: "Cena", difficulty: "Media", macros: { p: 28, c: 1, f: 9, kcal: 197 }, tags: ["high-protein", "low-carb"] },
      { id: 5, name: "Fiocchi di Latte con Noci e Berries", ingredients: ["fiocchi di latte", "noci", "mirtilli", "miele"], type: "Spuntino", difficulty: "Facile", macros: { p: 18, c: 15, f: 8, kcal: 204 }, tags: ["high-protein"] },
      { id: 6, name: "Riso Basmati con Tonno e Zucchine", ingredients: ["riso", "tonno", "zucchine", "olio"], type: "Pranzo", difficulty: "Facile", macros: { p: 30, c: 45, f: 6, kcal: 354 }, tags: ["high-protein", "low-fat"] },
      { id: 7, name: "Shaker Proteico Avena e Banana", ingredients: ["latte", "proteine in polvere", "avena", "banana"], type: "Colazione", difficulty: "Facile", macros: { p: 38, c: 35, f: 4, kcal: 328 }, tags: ["high-protein", "low-fat"] },
      { id: 8, name: "Frittata al Forno con Feta", ingredients: ["uova", "zucchine", "feta", "cipolla"], type: "Cena", difficulty: "Facile", macros: { p: 22, c: 6, f: 14, kcal: 238 }, tags: ["high-protein"] },
      { id: 9, name: "Merluzzo in Umido al Pomodoro", ingredients: ["merluzzo", "pomodoro", "origano", "aglio", "olio"], type: "Cena", difficulty: "Facile", macros: { p: 24, c: 5, f: 4, kcal: 152 }, tags: ["high-protein", "low-carb", "low-fat"] },
      { id: 10, name: "Pancake Proteici Fit", ingredients: ["albumi", "avena", "yogurt greco", "banana"], type: "Colazione", difficulty: "Media", macros: { p: 25, c: 28, f: 3, kcal: 239 }, tags: ["high-protein", "low-fat"] },
    ];

    const DAYS = ["Lunedì", "Martedì", "Mercoledì", "Giovedì", "Venerdì", "Sabato", "Domenica"];
    const MEAL_TYPES = ["Colazione", "Pranzo", "Cena"];

    const fitnessRecipeSchema = {
      type: "OBJECT",
      properties: {
        name: { type: "STRING" },
        type: { type: "STRING" },
        difficulty: { type: "STRING" },
        ingredients: { type: "ARRAY", items: { type: "STRING" } },
        missingIngredients: { type: "ARRAY", items: { type: "STRING" } },
        instructions: { type: "ARRAY", items: { type: "STRING" } },
        macros: {
          type: "OBJECT",
          properties: {
            p: { type: "NUMBER" },
            c: { type: "NUMBER" },
            f: { type: "NUMBER" },
            kcal: { type: "NUMBER" }
          },
          required: ["p", "c", "f", "kcal"]
        },
        fitnessBenefit: { type: "STRING" }
      },
      required: ["name", "type", "difficulty", "ingredients", "missingIngredients", "instructions", "macros", "fitnessBenefit"]
    };

    const API_KEY = "AQ.Ab8RN6IHKA0XgwUR6TuqzIOVyK4qSIk-4VoHf27QCWuLCqzR9Q";
    const GEMINI_MODEL = "gemini-2.5-flash-preview-09-2025";

    // --- STATE ---
    const state = {
      activeTab: 'pantry',
      pantryItems: ['pollo', 'broccoli', 'albumi', 'riso', 'tonno'],
      newItem: '',
      macroFilter: 'all',
      weeklyPlan: {},
      aiRecipe: null,
      isGeneratingRecipe: false,
      recipeError: null,
      chatMessages: [
        { role: 'assistant', text: 'Ciao atleta! Sono il tuo Coach & Chef Nutrizionista. Chiedimi pure come ottimizzare i macro della tua dispensa, cosa mangiare pre/post-workout o come sostituire gli ingredienti! 🏋️‍♂️🍳' }
      ],
      userMsg: '',
      isSendingMsg: false
    };

    // --- RENDER ---
    const app = document.getElementById('app');

    function render() {
      app.innerHTML = buildApp();
      attachEvents();
      scrollChat();
    }

    function escapeHtml(text) {
      return text.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;','\'':'&#39;'}[c]));
    }

    function buildApp() {
      return `
        <div class="min-h-screen bg-slate-50 text-slate-800 flex flex-col font-sans pb-20 selection:bg-indigo-500 selection:text-white">
          ${buildHeader()}
          <main class="flex-1 max-w-2xl mx-auto w-full p-4">
            ${state.recipeError ? buildErrorBanner() : ''}
            ${state.isGeneratingRecipe ? buildLoading() : ''}
            ${state.activeTab === 'pantry' && !state.isGeneratingRecipe ? buildPantry() : ''}
            ${state.activeTab === 'recipes' && !state.isGeneratingRecipe ? buildRecipes() : ''}
            ${state.activeTab === 'ai-chef' && !state.isGeneratingRecipe ? buildAIChef() : ''}
            ${state.activeTab === 'planner' ? buildPlanner() : ''}
          </main>
          ${buildNav()}
        </div>
      `;
    }

    function buildHeader() {
      return `
        <header class="bg-white border-b border-slate-200 sticky top-0 z-10 backdrop-blur-md bg-opacity-95 shadow-sm">
          <div class="max-w-2xl mx-auto px-4 py-3.5 flex justify-between items-center">
            <div class="flex items-center gap-2.5">
              <div class="bg-indigo-600 p-2 rounded-xl text-white shadow-md shadow-indigo-200">${Icons.Dumbbell({ size: 22 })}</div>
              <div>
                <h1 class="text-lg font-black tracking-tight text-slate-900">FitPrep</h1>
                <p class="text-[10px] text-indigo-600 font-bold uppercase tracking-widest">SvuotaFrigo Performance</p>
              </div>
            </div>
            <button
              id="btn-analizza"
              class="flex items-center gap-1.5 text-xs font-black py-2 px-4 rounded-xl bg-gradient-to-r from-indigo-600 to-indigo-500 hover:from-indigo-700 hover:to-indigo-600 text-white transition-all shadow-md shadow-indigo-100"
            >
              ${state.isGeneratingRecipe ? Icons.Loader2({ size: 14, className: 'animate-spin' }) : Icons.Sparkles({ size: 14 })}
              <span>Analizza Macro IA ✨</span>
            </button>
          </div>
        </header>
      `;
    }

    function buildErrorBanner() {
      return `
        <div class="mb-4 bg-red-50 border border-red-200 text-red-800 p-4 rounded-2xl flex items-start gap-3 animate-scaleIn shadow-sm">
          <div class="text-red-500 shrink-0 mt-0.5">${Icons.AlertCircle({ size: 18 })}</div>
          <p class="text-xs font-semibold flex-1">${escapeHtml(state.recipeError)}</p>
          <button id="btn-close-error" class="text-red-400 hover:text-red-600">${Icons.X({ size: 16 })}</button>
        </div>
      `;
    }

    function buildLoading() {
      return `
        <div class="bg-white rounded-3xl p-8 border border-slate-200 text-center space-y-4 my-8 shadow-sm animate-pulse">
          <div class="animate-spin text-indigo-500 mx-auto">${Icons.Sparkles({ size: 32 })}</div>
          <h3 class="text-base font-bold text-slate-800">Il Nutrizionista IA sta calcolando il bilanciamento ideale...</h3>
          <div class="flex justify-center gap-1">
            <span class="h-1.5 w-1.5 bg-indigo-500 rounded-full animate-bounce" style="animation-delay:0.1s"></span>
            <span class="h-1.5 w-1.5 bg-indigo-500 rounded-full animate-bounce" style="animation-delay:0.2s"></span>
            <span class="h-1.5 w-1.5 bg-indigo-500 rounded-full animate-bounce" style="animation-delay:0.3s"></span>
          </div>
        </div>
      `;
    }

    function buildPantry() {
      return `
        <div class="space-y-4">
          <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
            <h2 class="text-sm font-bold text-slate-500 uppercase tracking-wider mb-3">I tuoi mattoni nutrizionali (Dispensa)</h2>
            <div class="flex gap-2 mb-4">
              <input
                id="input-new-item"
                type="text"
                value="${escapeHtml(state.newItem)}"
                placeholder="Es. Pollo, Tonno, Albumi, Riso..."
                class="flex-1 px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm transition-all text-slate-800 placeholder:text-slate-400"
              />
              <button id="btn-add-item" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 rounded-xl font-bold transition-all">${Icons.Plus({ size: 18 })}</button>
            </div>
            <div class="flex flex-wrap gap-2">
              ${state.pantryItems.map((item, idx) => `
                <span class="inline-flex items-center gap-1 px-3 py-1.5 bg-slate-50 border border-slate-200 text-slate-700 rounded-xl text-xs font-bold uppercase tracking-wide shadow-sm">
                  ${escapeHtml(item)}
                  <button data-remove="${escapeHtml(item)}" class="text-slate-400 hover:text-red-500 ml-1">${Icons.X({ size: 12 })}</button>
                </span>
              `).join('')}
            </div>
          </div>
          <div class="bg-gradient-to-br from-indigo-50 to-violet-50/50 p-5 rounded-3xl border border-indigo-100 flex items-center justify-between gap-4 shadow-sm">
            <div class="space-y-1">
              <div class="flex items-center gap-1.5 text-indigo-600 text-xs font-black uppercase tracking-wider">
                ${Icons.Target({ size: 14 })} <span>Ottimizzazione Obiettivi</span>
              </div>
              <p class="text-slate-600 text-xs leading-relaxed max-w-sm">
                L'app calcolerà i macronutrienti esatti per darti il massimo supporto durante l'ipertrofia o la definizione.
              </p>
            </div>
          </div>
        </div>
      `;
    }

    function buildRecipes() {
      const recipes = filteredAndSuggestedRecipes();
      return `
        <div class="space-y-4">
          <div class="flex gap-1.5 overflow-x-auto pb-1 scrollbar-none">
            ${buildFilterButtons()}
          </div>
          ${state.aiRecipe ? buildAiRecipeCard(state.aiRecipe) : ''}
          <div class="space-y-3">
            ${recipes.map(r => buildRecipeCard(r)).join('')}
          </div>
        </div>
      `;
    }

    function buildFilterButtons() {
      const filters = [
        { label: 'Tutte', value: 'all' },
        { label: '💪 High Protein', value: 'high-protein' },
        { label: '🥑 Low Carb', value: 'low-carb' },
        { label: '🏃‍♂️ Low Fat', value: 'low-fat' }
      ];
      return filters.map(f => `
        <button data-filter="${f.value}" class="px-3 py-1.5 rounded-xl text-xs font-bold transition-all whitespace-nowrap border ${
          state.macroFilter === f.value
            ? 'bg-indigo-600 border-indigo-500 text-white shadow-sm shadow-indigo-100'
            : 'bg-white border-slate-200 text-slate-500 hover:border-slate-300 hover:text-slate-700'
        }">
          ${escapeHtml(f.label)}
        </button>
      `).join('');
    }

    function buildAiRecipeCard(recipe) {
      return `
        <div class="bg-gradient-to-b from-indigo-50/70 to-white border border-indigo-100 p-5 rounded-3xl shadow-md space-y-4 animate-scaleIn">
          <div>
            <div class="flex flex-wrap items-center gap-2 mb-2">
              <span class="bg-indigo-600 text-white text-[9px] font-black px-2 py-0.5 rounded-md uppercase tracking-wider">RICETTA NUTRIZIONISTA IA ✨</span>
              <span class="bg-slate-100 text-slate-700 text-[9px] font-bold px-2 py-0.5 rounded-md uppercase">${escapeHtml(recipe.type)}</span>
            </div>
            <h3 class="text-xl font-black text-slate-900">${escapeHtml(recipe.name)}</h3>
          </div>
          <div class="grid grid-cols-4 gap-2 text-center bg-white p-3 rounded-2xl border border-slate-200 shadow-sm">
            <div class="text-center">
              <span class="text-[8px] font-black tracking-wider text-slate-400 block uppercase">PRO</span>
              <span class="text-xs font-black text-indigo-600">${recipe.macros.p}g</span>
            </div>
            <div class="text-center">
              <span class="text-[8px] font-black tracking-wider text-slate-400 block uppercase">CARB</span>
              <span class="text-xs font-black text-amber-600">${recipe.macros.c}g</span>
            </div>
            <div class="text-center">
              <span class="text-[8px] font-black tracking-wider text-slate-400 block uppercase">GRASSI</span>
              <span class="text-xs font-black text-emerald-600">${recipe.macros.f}g</span>
            </div>
            <div class="text-center">
              <span class="text-[8px] font-black tracking-wider text-slate-400 block uppercase">CALORIE</span>
              <span class="text-xs font-black text-rose-600 flex items-center justify-center gap-0.5">${Icons.Flame({ size: 10 })} ${recipe.macros.kcal}</span>
            </div>
          </div>
          <div class="text-xs text-indigo-900 bg-indigo-50 p-3 rounded-xl border border-indigo-100 leading-relaxed font-medium">
            <strong>Focus Performance:</strong> ${escapeHtml(recipe.fitnessBenefit)}
          </div>
          <div class="space-y-2">
            <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider">Preparazione Fit:</h4>
            <ol class="list-decimal pl-4 text-xs text-slate-600 space-y-1.5 font-medium">
              ${recipe.instructions.map(step => `<li>${escapeHtml(step)}</li>`).join('')}
            </ol>
          </div>
          ${buildAddToPlanButton(recipe.name)}
        </div>
      `;
    }

    function buildRecipeCard(recipe) {
      return `
        <div class="bg-white border border-slate-200 p-4 rounded-3xl space-y-3 shadow-sm">
          <div class="flex justify-between items-start">
            <div>
              <div class="flex items-center gap-2 mb-1">
                <span class="text-[10px] bg-indigo-50 text-indigo-600 font-bold px-1.5 py-0.5 rounded border border-indigo-100">${recipe.matchPercentage}% Ingredienti</span>
                <span class="text-[10px] text-slate-400 uppercase tracking-wider font-semibold">${escapeHtml(recipe.type)}</span>
              </div>
              <h4 class="font-extrabold text-slate-900 text-sm">${escapeHtml(recipe.name)}</h4>
            </div>
          </div>
          <div class="grid grid-cols-4 gap-1 text-center bg-slate-50 p-2 rounded-xl text-[11px] font-semibold border border-slate-100">
            <div><span class="text-slate-400 block text-[9px] font-bold">P</span> <span class="text-indigo-600">${recipe.macros.p}g</span></div>
            <div><span class="text-slate-400 block text-[9px] font-bold">C</span> <span class="text-amber-600">${recipe.macros.c}g</span></div>
            <div><span class="text-slate-400 block text-[9px] font-bold">F</span> <span class="text-emerald-600">${recipe.macros.f}g</span></div>
            <div><span class="text-slate-400 block text-[9px] font-bold">KCAL</span> <span class="text-rose-600">${recipe.macros.kcal}</span></div>
          </div>
          <div class="text-[11px] text-slate-500 font-medium">
            ${recipe.missingIngredients.length > 0 ? `<p><span class="text-rose-500 font-bold">Manca: </span>${escapeHtml(recipe.missingIngredients.join(', '))}</p>` : ''}
          </div>
          ${buildAddToPlanButton(recipe.name)}
        </div>
      `;
    }

    function buildAddToPlanButton(recipeName) {
      return `
        <div class="w-full">
          <button data-open-plan="${escapeHtml(recipeName)}" class="w-full bg-slate-50 hover:bg-slate-100 border border-slate-200 text-[11px] font-bold py-1.5 rounded-xl text-slate-600 transition-all">
            Aggiungi al Piano Settimanale
          </button>
          <div class="plan-dropdown hidden mt-2 bg-slate-50 border border-slate-200 p-2 rounded-xl grid grid-cols-2 gap-1">
            ${DAYS.map(day => `
              <div class="flex justify-between items-center p-1 bg-white rounded-lg border border-slate-100 shadow-sm">
                <span class="text-[10px] text-slate-500 font-bold">${escapeHtml(day.substring(0,3))}</span>
                <div class="flex gap-1">
                  <button data-add="${escapeHtml(day)}-Pranzo-${escapeHtml(recipeName)}" class="p-1 bg-slate-50 rounded hover:bg-indigo-50 text-orange-500 border border-slate-100">${Icons.Sun({ size: 12 })}</button>
                  <button data-add="${escapeHtml(day)}-Cena-${escapeHtml(recipeName)}" class="p-1 bg-slate-50 rounded hover:bg-indigo-50 text-indigo-600 border border-slate-100">${Icons.Moon({ size: 12 })}</button>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }

    function buildAIChef() {
      return `
        <div class="bg-white rounded-3xl border border-slate-200 h-[60vh] flex flex-col overflow-hidden shadow-sm">
          <div class="bg-gradient-to-r from-indigo-50 to-white p-4 border-b border-slate-200 flex items-center gap-3">
            <div class="text-indigo-600">${Icons.Award({ size: 20 })}</div>
            <div>
              <h3 class="font-black text-sm text-slate-900">Coach Nutrizionale Fit IA ✨</h3>
              <p class="text-[10px] text-slate-500">Chiedi consigli su integrazione, timing dei pasti o ipertrofia</p>
            </div>
          </div>
          <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-3 bg-slate-50/50">
            ${state.chatMessages.map((msg, idx) => `
              <div class="flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}">
                <div class="max-w-[85%] rounded-2xl p-3 text-xs leading-relaxed font-medium shadow-sm ${
                  msg.role === 'user'
                    ? 'bg-indigo-600 text-white rounded-br-none'
                    : 'bg-white text-slate-700 border border-slate-200/60 rounded-bl-none'
                }">
                  ${escapeHtml(msg.text)}
                </div>
              </div>
            `).join('')}
            ${state.isSendingMsg ? '<div class="text-slate-500 text-[10px] animate-pulse">Il Coach sta analizzando i macro...</div>' : ''}
          </div>
          <div class="p-2.5 border-t border-slate-200 bg-white flex gap-2">
            <input
              id="input-user-msg"
              type="text"
              value="${escapeHtml(state.userMsg)}"
              placeholder="Cosa posso cucinare pre-workout con quello che ho?"
              class="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-xs text-slate-800 focus:outline-none focus:ring-1 focus:ring-indigo-500"
            />
            <button id="btn-send-msg" class="bg-indigo-600 text-white p-2 rounded-xl hover:bg-indigo-700 transition-colors">${Icons.Send({ size: 14 })}</button>
          </div>
        </div>
      `;
    }

    function buildPlanner() {
      return `
        <div class="space-y-4">
          <div class="flex justify-between items-center">
            <h2 class="text-sm font-bold uppercase tracking-wider text-slate-500">Pianificazione Allenamento & Nutrizione</h2>
            <button id="btn-clear-plan" class="text-[10px] bg-red-50 border border-red-200 text-red-600 font-bold px-2 py-1.5 rounded-md hover:bg-red-100 transition-colors">Svuota Piano</button>
          </div>
          <div class="space-y-3">
            ${DAYS.map(day => `
              <div class="bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm">
                <div class="bg-slate-50 px-4 py-2 border-b border-slate-200/80">
                  <span class="text-xs font-black text-indigo-600 uppercase tracking-wide">${escapeHtml(day)}</span>
                </div>
                <div class="divide-y divide-slate-100 text-xs font-semibold">
                  ${MEAL_TYPES.map(type => {
                    const meal = state.weeklyPlan[`${day}-${type}`];
                    return `
                      <div class="px-4 py-3 flex justify-between items-center">
                        <span class="text-[10px] text-slate-400 font-bold uppercase w-14">${escapeHtml(type)}</span>
                        <span class="font-semibold ${meal ? 'text-slate-800' : 'text-slate-400 italic font-medium'}">${meal ? escapeHtml(meal) : 'Riposo Nutrizionale'}</span>
                      </div>
                    `;
                  }).join('')}
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }

    function buildNav() {
      const tabs = [
        { id: 'pantry', label: 'Dispensa', icon: Icons.ShoppingCart },
        { id: 'recipes', label: 'Ricette Fit', icon: Icons.ChefHat },
        { id: 'ai-chef', label: 'Coach IA', icon: Icons.Sparkles },
        { id: 'planner', label: 'Meal Prep', icon: Icons.Calendar }
      ];
      return `
        <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 pb-safe z-20 shadow-lg">
          <div class="max-w-2xl mx-auto flex justify-between">
            ${tabs.map(t => `
              <button data-tab="${t.id}" class="flex flex-col items-center justify-center w-full py-3 transition-all ${
                state.activeTab === t.id
                  ? 'text-indigo-600 border-t-2 border-indigo-600 bg-indigo-50/50'
                  : 'text-slate-400 hover:text-slate-600'
              }">
                <div class="mb-1">${t.icon({ size: 20 })}</div>
                <span class="text-[11px] font-bold tracking-wide">${escapeHtml(t.label)}</span>
              </button>
            `).join('')}
          </div>
        </nav>
      `;
    }

    // --- LOGICA ---
    function filteredAndSuggestedRecipes() {
      return RECIPES_DB.map(recipe => {
        const ownedIngredients = recipe.ingredients.filter(ing => state.pantryItems.includes(ing));
        const missingIngredients = recipe.ingredients.filter(ing => !state.pantryItems.includes(ing));
        const matchPercentage = Math.round((ownedIngredients.length / recipe.ingredients.length) * 100);
        return { ...recipe, ownedIngredients, missingIngredients, matchPercentage };
      })
      .filter(recipe => state.macroFilter === 'all' ? true : recipe.tags.includes(state.macroFilter))
      .sort((a, b) => b.matchPercentage - a.matchPercentage);
    }

    function scrollChat() {
      const container = document.getElementById('chat-messages');
      if (container) {
        container.scrollTop = container.scrollHeight;
      }
    }

    // --- API ---
    async function callGemini(prompt, systemInstruction = "", responseSchema = null) {
      const url = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${API_KEY}`;
      const payload = { contents: [{ parts: [{ text: prompt }] }] };

      if (systemInstruction) {
        payload.systemInstruction = { parts: [{ text: systemInstruction }] };
      }

      if (responseSchema) {
        payload.generationConfig = {
          responseMimeType: "application/json",
          responseSchema
        };
      }

      let delay = 1000;
      for (let i = 0; i < 5; i++) {
        try {
          const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
          return await response.json();
        } catch (error) {
          if (i === 4) throw error;
          await new Promise(resolve => setTimeout(resolve, delay));
          delay *= 2;
        }
      }
    }

    async function generateAiRecipe() {
      if (state.pantryItems.length === 0) {
        state.recipeError = "Metti qualcosa in dispensa prima di chiedere i macro all'IA!";
        render();
        return;
      }

      state.isGeneratingRecipe = true;
      state.recipeError = null;
      state.aiRecipe = null;
      render();

      const pantryString = state.pantryItems.join(', ');
      const systemPrompt = "Sei un Biologo Nutrizionista Sportivo e Chef di altissimo livello. Il tuo compito è ideare una ricetta adatta ad atleti basandoti sugli ingredienti dell'utente. Calcola una stima realistica dei macronutrienti per porzione singola. Rispondi in italiano compilando rigorosamente lo schema JSON.";
      const userPrompt = `Dispensa attuale: ${pantryString}. Genera una ricetta fit personalizzata, calcola i macronutrienti accuratamente e descrivi l'utilità sportiva.`;

      try {
        const data = await callGemini(userPrompt, systemPrompt, fitnessRecipeSchema);
        const textResponse = data.candidates?.[0]?.content?.parts?.[0]?.text;
        if (!textResponse) throw new Error("Nessun dato ricevuto dall'IA");
        state.aiRecipe = JSON.parse(textResponse);
        state.activeTab = 'recipes';
      } catch (err) {
        state.recipeError = "Errore nella generazione dei macro. Riprova tra poco.";
      } finally {
        state.isGeneratingRecipe = false;
      }
      render();
    }

    async function handleSendMessage() {
      if (!state.userMsg.trim() || state.isSendingMsg) return;

      const messageToSend = state.userMsg;
      state.userMsg = '';
      state.chatMessages.push({ role: 'user', text: messageToSend });
      state.isSendingMsg = true;
      render();

      const pantryString = state.pantryItems.join(', ');
      const systemPrompt = `Sei il "Coach Nutrizionale FitPrep ✨", un esperto di nutrizione per sportivi. Rispondi in modo motivante, preciso ed estremamente tecnico riguardo a calorie e macronutrienti, tenendo conto che l'utente ha attualmente a disposizione questi ingredienti: ${pantryString}.`;
      const historyContext = state.chatMessages.slice(-6).map(m => `${m.role === 'user' ? 'Atleta' : 'Coach'}: ${m.text}`).join('\n');
      const fullPrompt = `${historyContext}\nAtleta: ${messageToSend}\nCoach:`;

      try {
        const data = await callGemini(fullPrompt, systemPrompt);
        const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || "Errore di comunicazione con i tuoi muscoli. Riprova!";
        state.chatMessages.push({ role: 'assistant', text: reply });
      } catch (err) {
        state.chatMessages.push({ role: 'assistant', text: "Connessione di rete debole. Riprova ad inviare la domanda." });
      } finally {
        state.isSendingMsg = false;
      }
      render();
    }

    function addPantryItem() {
      const item = state.newItem.trim().toLowerCase();
      if (item && !state.pantryItems.includes(item)) {
        state.pantryItems.push(item);
        state.newItem = '';
      }
    }

    function removePantryItem(item) {
      state.pantryItems = state.pantryItems.filter(i => i !== item);
    }

    function setMacroFilter(value) {
      state.macroFilter = value;
    }

    function setActiveTab(tab) {
      state.activeTab = tab;
    }

    function addToPlan(key, recipeName) {
      state.weeklyPlan[key] = recipeName;
      state.activeTab = 'planner';
    }

    function clearPlan() {
      state.weeklyPlan = {};
    }

    function closeError() {
      state.recipeError = null;
    }

    // --- EVENTI ---
    function attachEvents() {
      // Tabs
      document.querySelectorAll('[data-tab]').forEach(btn => {
        btn.addEventListener('click', () => { setActiveTab(btn.dataset.tab); render(); });
      });

      // Header: Analizza IA
      const btnAnalizza = document.getElementById('btn-analizza');
      if (btnAnalizza) btnAnalizza.addEventListener('click', generateAiRecipe);

      // Error banner
      const btnCloseError = document.getElementById('btn-close-error');
      if (btnCloseError) btnCloseError.addEventListener('click', closeError);

      // Pantry
      const inputNewItem = document.getElementById('input-new-item');
      const btnAddItem = document.getElementById('btn-add-item');
      if (inputNewItem && btnAddItem) {
        btnAddItem.addEventListener('click', addPantryItem);
        inputNewItem.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') addPantryItem();
        });
      }

      document.querySelectorAll('[data-remove]').forEach(btn => {
        btn.addEventListener('click', () => { removePantryItem(btn.dataset.remove); render(); });
      });

      // Filti
      document.querySelectorAll('[data-filter]').forEach(btn => {
        btn.addEventListener('click', () => { setMacroFilter(btn.dataset.filter); render(); });
      });

      // Pianificazione: open/close
      document.querySelectorAll('[data-open-plan]').forEach(btn => {
        btn.addEventListener('click', () => {
          const all = document.querySelectorAll('.plan-dropdown');
          all.forEach(d => d.classList.add('hidden'));
          const panel = btn.nextElementSibling;
          if (panel) panel.classList.toggle('hidden');
        });
      });

      document.querySelectorAll('[data-add]').forEach(btn => {
        btn.addEventListener('click', () => {
          const parts = btn.dataset.add.split('-');
          const day = parts[0];
          const meal = parts[1];
          const recipe = parts[2];
          addToPlan(`${day}-${meal}`, recipe);
          document.querySelectorAll('.plan-dropdown').forEach(d => d.classList.add('hidden'));
          render();
        });
      });

      document.getElementById('btn-clear-plan')?.addEventListener('click', () => {
        clearPlan();
        render();
      });

      // Chat
      const inputMsg = document.getElementById('input-user-msg');
      const btnSend = document.getElementById('btn-send-msg');
      if (inputMsg && btnSend) {
        btnSend.addEventListener('click', handleSendMessage);
        inputMsg.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') handleSendMessage();
        });
      }
    }

    // --- INIT ---
    render();
  </script>
</body>
</html>
