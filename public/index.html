<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>FitPrep - FitMeal AI Planner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; }
    .scrollbar-none::-webkit-scrollbar { display: none; }
    .scrollbar-none { -ms-overflow-style: none; scrollbar-width: none; }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    @keyframes scaleIn { from { transform: scale(.98); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .animate-scaleIn { animation: scaleIn .18s ease-out; }
    .tab-active {
      color: #4f46e5;
      border-top-width: 2px;
      border-color: #4f46e5;
      background-color: rgba(238, 242, 255, 0.7);
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800">
  <div class="min-h-screen flex flex-col pb-20">
    <!-- Header -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-10 backdrop-blur-md bg-opacity-95 shadow-sm">
      <div class="max-w-3xl mx-auto px-4 py-3.5 flex justify-between items-center">
        <div class="flex items-center gap-2.5">
          <div class="bg-indigo-600 p-2 rounded-xl text-white shadow-md shadow-indigo-200">
            🏋️
          </div>
          <div>
            <h1 class="text-lg font-black tracking-tight text-slate-900">FitPrep</h1>
            <p class="text-[10px] text-indigo-600 font-bold uppercase tracking-widest">
              FitMeal AI Planner
            </p>
          </div>
        </div>
        <button id="btn-generate-recipe"
          class="text-xs font-black py-2 px-4 rounded-xl bg-indigo-600 hover:bg-indigo-700 text-white flex items-center gap-1.5 shadow-md shadow-indigo-100">
          <span>Analizza Macro IA ✨</span>
        </button>
      </div>
    </header>

    <!-- Main content (riempito da app.js) -->
    <main class="flex-1 max-w-3xl mx-auto w-full p-4" id="main-content"></main>

    <!-- Tab bar -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 pb-safe z-20 shadow-lg">
      <div class="max-w-3xl mx-auto flex justify-between">
        <button data-tab="pantry"
          class="tab-btn flex flex-col items-center justify-center w-full py-3 text-slate-400">
          <span class="text-[11px] font-bold tracking-wide">Dispensa</span>
        </button>
        <button data-tab="recipes"
          class="tab-btn flex flex-col items-center justify-center w-full py-3 text-slate-400">
          <span class="text-[11px] font-bold tracking-wide">Ricette Fit</span>
        </button>
        <button data-tab="coach"
          class="tab-btn flex flex-col items-center justify-center w-full py-3 text-slate-400">
          <span class="text-[11px] font-bold tracking-wide">Coach IA</span>
        </button>
        <button data-tab="planner"
          class="tab-btn flex flex-col items-center justify-center w-full py-3 text-slate-400">
          <span class="text-[11px] font-bold tracking-wide">Meal Prep</span>
        </button>
      </div>
    </nav>
  </div>

  <script src="./app.js"></script>
</body>
</html>
